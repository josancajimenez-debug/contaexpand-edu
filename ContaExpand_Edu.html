<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="ContaExpand Edu: herramienta educativa de contabilidad avanzada con enfoque NIIF completas (Costa Rica). Expansion empresarial, agencias y sucursales, subsidiarias y empresas asociadas, con ejemplos, simuladores, casos resueltos y autoevaluacion.">
  <meta name="theme-color" content="#0b2930">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>&#128202;</text></svg>">
  <title>ContaExpand Edu</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --panel: #ffffff;
      --canvas: #eef2f7;
      --teal: #0d9488;
      --blue: #4f46e5;
      --rose: #e11d48;
      --amber: #d97706;
      --green: #16a34a;
      --violet: #7c3aed;
      --focus: #4f46e5;
      --shadow: 0 10px 30px rgba(15, 23, 42, .08);
      --shadow-lg: 0 22px 48px rgba(15, 23, 42, .16);
      --radius: 14px;
      --radius-sm: 10px;
      --brand-grad: linear-gradient(135deg, #0d9488 0%, #2563eb 55%, #7c3aed 100%);
      --sidebar-grad: linear-gradient(180deg, #0b2930 0%, #0c1f3a 100%);
      --trans: .22s cubic-bezier(.4, 0, .2, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background: var(--canvas);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      min-height: 38px;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
    }

    button:hover { border-color: #9fb0bf; }
    button:focus, input:focus, select:focus, textarea:focus {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    button.primary {
      background: var(--teal);
      border-color: var(--teal);
      color: #fff;
      font-weight: 700;
    }

    button.ghost {
      background: transparent;
    }

    button.icon {
      width: 40px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 9px 10px;
    }

    textarea { min-height: 92px; resize: vertical; }

    .app {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      background: #0b2930;
      color: #eef8f7;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      display: block;
    }

    .brand-logo-img {
      display: block;
      width: 100%;
      max-width: 240px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, .35);
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
    }

    .brand p {
      margin: 2px 0 0;
      color: #b8d6d1;
      font-size: 12px;
    }

    .profile-box {
      border: 1px solid rgba(255,255,255,.16);
      border-radius: var(--radius);
      padding: 12px;
      background: rgba(255,255,255,.05);
    }

    .profile-box label,
    .small-label {
      display: block;
      font-size: 12px;
      color: #c5dedb;
      margin: 0 0 6px;
    }

    .profile-box input,
    .profile-box select {
      background: #113941;
      border-color: #315c64;
      color: #fff;
    }

    .profile-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .row-actions { white-space: nowrap; }
    .del-profile, .rename-profile, .reset-profile { min-height: 30px; padding: 4px 10px; font-size: 12px; }
    .del-profile { color: #be123c; border-color: #f3b0bd; }
    .del-profile:hover { background: #fff1f2; border-color: #e11d48; }
    .rename-profile { color: #1d4ed8; border-color: #bfdbfe; }
    .rename-profile:hover { background: #eff6ff; border-color: #2563eb; }
    .reset-profile { color: #b45309; border-color: #fed7aa; }
    .reset-profile:hover { background: #fff7ed; border-color: #d97706; }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav button {
      text-align: left;
      background: transparent;
      border-color: rgba(255,255,255,.13);
      color: #f2fbfa;
      display: grid;
      grid-template-columns: 30px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 9px;
    }

    .nav button.active {
      background: #e8f7f4;
      color: #083039;
      border-color: #e8f7f4;
    }

    .nav .num {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.12);
      font-weight: 800;
      font-size: 13px;
    }

    .nav button.active .num { background: #bee7df; }
    .nav .done { font-size: 12px; opacity: .85; }

    .sidebar-note {
      margin-top: auto;
      color: #bfd7d4;
      font-size: 12px;
      border-top: 1px solid rgba(255,255,255,.14);
      padding-top: 12px;
    }

    .main {
      min-width: 0;
      padding: 22px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 24px;
    }

    .topbar p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, .55fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-head h3 {
      margin: 0;
      font-size: 16px;
    }

    .panel-body { padding: 16px; }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px;
      background: #eef3f5;
      border-bottom: 1px solid var(--line);
    }

    .tabs button {
      min-height: 34px;
      padding: 6px 10px;
      background: #fff;
    }

    .tabs button.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      font-weight: 700;
    }

    .unit-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .info {
      border-left: 4px solid var(--teal);
      background: #f0fdfa;
      padding: 12px;
      border-radius: 6px;
      margin: 0 0 12px;
    }

    .warning {
      border-left-color: var(--amber);
      background: #fff7ed;
    }

    .danger {
      border-left-color: var(--rose);
      background: #fff1f2;
    }

    .mini {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #fff;
    }

    .mini h4 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .mini p, .mini ul, .mini ol {
      margin-top: 6px;
      margin-bottom: 0;
      color: var(--muted);
    }

    .mini ul, .mini ol { padding-left: 19px; }

    .flow {
      display: grid;
      gap: 8px;
      counter-reset: step;
    }

    .flow div {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 10px 10px 42px;
      position: relative;
      background: #fbfdfe;
    }

    .flow div::before {
      counter-increment: step;
      content: counter(step);
      position: absolute;
      left: 10px;
      top: 10px;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: 800;
      font-size: 12px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
    }

    .stat strong {
      display: block;
      font-size: 22px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .progress {
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--teal), var(--blue), var(--green));
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .result-box {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      margin-top: 12px;
      min-height: 92px;
    }

    .journal {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
    }

    .journal th, .journal td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    .journal th {
      background: #eef3f5;
      color: #334155;
    }

    .quiz-options {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .quiz-options button {
      text-align: left;
      background: #fff;
    }

    .quiz-options button.correct {
      background: #ecfdf5;
      border-color: #86efac;
    }

    .quiz-options button.incorrect {
      background: #fff1f2;
      border-color: #fda4af;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #e8f7f4;
      color: #0f766e;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.blue { background: #dbeafe; color: #1d4ed8; }
    .badge.amber { background: #fef3c7; color: #92400e; }
    .badge.rose { background: #ffe4e6; color: #be123c; }
    .badge.violet { background: #ede9fe; color: #6d28d9; }

    .rubric {
      display: grid;
      gap: 8px;
    }

    .rubric label {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 8px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px;
      background: #fff;
    }

    .rubric input {
      width: auto;
      margin-top: 4px;
    }

    .term-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .term-chips button.badge {
      min-height: 26px;
      border: 1px solid #bfdbfe;
      cursor: pointer;
    }

    .term-chips button.badge:hover {
      background: #bfdbfe;
      color: #1e3a8a;
    }

    .unit-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
    }
    .unit-nav button { font-weight: 700; }
    .unit-nav button:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }
    .unit-nav button:disabled:hover { transform: none; }

    .screen { display: none; }
    .screen.active { display: block; }

    .empty {
      color: var(--muted);
      background: #f8fafc;
      border: 1px dashed #b9c5cf;
      padding: 12px;
      border-radius: 6px;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; }
      .layout { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .main { padding: 14px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
      .unit-grid, .form-grid, .stat-grid { grid-template-columns: 1fr; }
      .panel-head { align-items: flex-start; flex-direction: column; }
    }
    /* ===== Renovacion visual: interfaz llamativa, interactiva y responsive ===== */
    html, body {
      font-family: "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1100px 560px at 100% -10%, #e0e7ff 0%, transparent 58%),
        radial-gradient(900px 480px at -10% 8%, #ccfbf1 0%, transparent 52%),
        var(--canvas);
    }

    button {
      border-radius: 10px;
      transition: transform var(--trans), box-shadow var(--trans), background var(--trans), border-color var(--trans), color var(--trans);
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    button.primary {
      background: var(--brand-grad);
      border: 0;
      box-shadow: 0 8px 18px rgba(37, 99, 235, .28);
    }
    button.primary:hover { box-shadow: 0 12px 26px rgba(37, 99, 235, .40); }

    input, select, textarea {
      border-radius: 10px;
      transition: border-color var(--trans), box-shadow var(--trans);
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, .18);
    }

    .sidebar { background: var(--sidebar-grad); box-shadow: 4px 0 24px rgba(2, 12, 27, .18); }

    .nav button { border-radius: 12px; transition: transform var(--trans), background var(--trans), color var(--trans), border-color var(--trans); }
    .nav button:hover { transform: translateX(3px); background: rgba(255, 255, 255, .08); border-color: rgba(255, 255, 255, .28); }
    .nav button.active { background: linear-gradient(135deg, #e8f7f4, #dbeafe); box-shadow: 0 8px 18px rgba(0, 0, 0, .25); }
    .nav .num { background: linear-gradient(135deg, #37b7a5, #4f7cff); color: #04121a; }
    .nav .done { background: rgba(255, 255, 255, .14); padding: 2px 8px; border-radius: 999px; }
    .nav button.active .done { background: #bfe7df; color: #06343b; }

    .topbar h2 {
      background: var(--brand-grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 800;
      letter-spacing: -.3px;
    }

    .toolbar button { border-radius: 999px; }
    .toolbar button:hover { border-color: var(--blue); color: var(--blue); }

    .panel { border-radius: var(--radius); transition: box-shadow var(--trans); }
    .panel:hover { box-shadow: var(--shadow-lg); }
    .panel-head { background: linear-gradient(180deg, #fbfdff, #f3f6fb); }

    .tabs { background: #f1f5f9; border: 0; border-radius: 12px; margin: 10px; padding: 6px; gap: 4px; }
    .tabs button { border: 0; background: transparent; border-radius: 9px; color: var(--muted); }
    .tabs button:hover { background: #e2e8f0; color: var(--ink); }
    .tabs button.active { background: var(--brand-grad); color: #fff; box-shadow: 0 6px 14px rgba(37, 99, 235, .3); }

    .stat {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      transition: transform var(--trans), box-shadow var(--trans);
    }
    .stat:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .stat::before { content: ""; position: absolute; top: 0; bottom: 0; left: 0; width: 4px; background: var(--brand-grad); }
    .stat strong { background: var(--brand-grad); -webkit-background-clip: text; background-clip: text; color: transparent; }

    .mini { border-radius: var(--radius-sm); transition: transform var(--trans), box-shadow var(--trans), border-color var(--trans); }
    .mini:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: #c7d2fe; }

    .progress { height: 12px; background: #e6ebf2; }
    .progress > span { transition: width .6s cubic-bezier(.4, 0, .2, 1); background: var(--brand-grad); position: relative; }
    .progress > span::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .55), transparent);
      animation: shimmer 1.9s infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    .flow div { transition: transform var(--trans), border-color var(--trans); }
    .flow div:hover { transform: translateX(3px); border-color: #c7d2fe; }

    .quiz-options button { border-radius: 10px; transition: all var(--trans); }
    .quiz-options button:hover { border-color: var(--blue); background: #f5f7ff; }
    .quiz-options button.correct { animation: pop .3s ease; }
    .quiz-options button.incorrect { animation: shake .32s ease; }
    @keyframes pop { 0% { transform: scale(.97); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }

    .info, .warning, .danger { border-radius: 10px; }

    .checklist { list-style: none; padding: 0; margin: 8px 0 12px; display: grid; gap: 6px; }
    .checklist .check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 7px 9px;
      background: #fff;
      transition: background var(--trans), border-color var(--trans), color var(--trans);
    }
    .checklist .check.done { color: var(--ink); border-color: #bbf7d0; background: #f0fdf4; }
    .checklist .tick {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 6px;
      background: #eef2f7;
      color: var(--muted);
      font-weight: 800;
      font-size: 12px;
    }
    .checklist .check.done .tick { background: linear-gradient(135deg, #16a34a, #0d9488); color: #fff; }
    .checklist em { margin-left: auto; font-style: normal; font-size: 11px; opacity: .75; }

    .concept-list { list-style: none; padding: 0; margin: 8px 0 0; display: grid; gap: 8px; }
    .concept {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      background: #fff;
      cursor: pointer;
      color: var(--muted);
      transition: background var(--trans), border-color var(--trans), color var(--trans), transform var(--trans);
    }
    .concept:hover { border-color: #c7d2fe; transform: translateX(2px); }
    .concept.read { color: var(--ink); border-color: #bbf7d0; background: #f0fdf4; }
    .concept .tick {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 6px;
      background: #eef2f7;
      color: var(--muted);
      font-weight: 800;
      font-size: 12px;
      margin-top: 1px;
    }
    .concept.read .tick { background: linear-gradient(135deg, #16a34a, #0d9488); color: #fff; }

    .niif18-legend { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 8px; }
    .niif18-legend .cat { font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 999px; border: 1px solid var(--line); }
    .niif18-legend .op { background: #f0fdfa; color: #0f766e; border-color: #99f6e4; }
    .niif18-legend .inv { background: #eef2ff; color: #4338ca; border-color: #c7d2fe; }
    .niif18-legend .fin { background: #fff7ed; color: #b45309; border-color: #fed7aa; }

    .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-wrap .journal { min-width: 420px; }
    .manual-list { margin: 4px 0 0; padding-left: 20px; }
    .manual-list li { margin-bottom: 9px; line-height: 1.55; }
    .panel-actions { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 10px; }

    .hero {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 30px 34px;
      margin-bottom: 18px;
      min-height: 156px;
      border-radius: var(--radius);
      color: #eef8ff;
      background: var(--brand-grad);
      box-shadow: var(--shadow-lg);
    }
    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -80px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 255, 255, .28), transparent 70%);
      border-radius: 50%;
    }
    .hero-main { position: relative; z-index: 1; flex: 1 1 420px; }
    .hero-badge {
      display: inline-block;
      background: rgba(255, 255, 255, .18);
      color: #fff;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .3px;
      margin-bottom: 10px;
    }
    .hero h3 { margin: 0; font-size: 30px; line-height: 1.1; letter-spacing: -.5px; }
    .hero p { margin: 8px 0 0; color: #e6efff; font-size: 15px; max-width: 60ch; }
    .hero-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .hero-chips span {
      background: rgba(255, 255, 255, .15);
      color: #eef8ff;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .hero-cta {
      margin-top: 18px;
      background: #ffffff;
      color: #1e3a8a;
      border: 0;
      font-weight: 800;
      padding: 10px 18px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, .22);
    }
    .hero-cta:hover { background: #eef2ff; box-shadow: 0 12px 24px rgba(0, 0, 0, .3); }
    .hero-ring {
      flex: 0 0 auto;
      position: relative;
      z-index: 1;
      width: 128px;
      height: 128px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      background: conic-gradient(#ffffff var(--val, 0%), rgba(255, 255, 255, .22) 0);
    }
    .hero-ring span {
      display: grid;
      place-items: center;
      width: 104px;
      height: 104px;
      border-radius: 50%;
      background: rgba(9, 30, 45, .55);
      backdrop-filter: blur(2px);
    }
    .hero-ring strong { font-size: 28px; font-weight: 800; line-height: 1; }
    .hero-ring small { display: block; font-size: 11px; opacity: .85; font-weight: 600; margin-top: 2px; }

    .screen.active { animation: fadeUp .35s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .menu-toggle { display: none; width: 44px; height: 44px; font-size: 20px; border-radius: 12px; }
    .backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(2, 12, 27, .5);
      z-index: 40;
      opacity: 0;
      transition: opacity var(--trans);
    }
    .backdrop.show { display: block; opacity: 1; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translate(-50%, 20px);
      background: #0f172a;
      color: #fff;
      padding: 12px 18px;
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--trans), transform var(--trans);
      z-index: 60;
      font-weight: 600;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: min(86vw, 300px);
        z-index: 50;
        transform: translateX(-100%);
        transition: transform .28s cubic-bezier(.4, 0, .2, 1);
      }
      .sidebar.open { transform: translateX(0); box-shadow: 8px 0 40px rgba(2, 12, 27, .45); }
      .menu-toggle { display: inline-grid; place-items: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    .print-sheet { display: none; }

    @media print {
      .sidebar, .toolbar, .menu-toggle, .backdrop, .toast, #printCasos, #printUnit, .del-profile, .rename-profile, .reset-profile, [data-caso-filter] { display: none !important; }
      .app { grid-template-columns: 1fr; }
      .main { padding: 0; }
      .panel { box-shadow: none; border-color: #cbd5e1; break-inside: avoid; }
      details > div { display: block !important; }
      .topbar h2 { color: #0f172a !important; -webkit-text-fill-color: #0f172a; }
      body.printing-unit .app { display: none !important; }
      body.printing-unit .print-sheet { display: block !important; padding: 8px; }
      .print-sheet h1 { font-size: 20px; margin: 0 0 4px; }
      .print-sheet .journal, .print-sheet .result-box { break-inside: avoid; }
    }
  </style>
</head>

    const glossary = [
      { term: "Distribuidor interno", unit: "Unidad 1", def: "Unidad, departamento o canal dependiente de la misma entidad juridica; no constituye otra entidad. Se controla por centro de responsabilidad, no por consolidacion." },
      { term: "Distribuidor externo", unit: "Unidad 1", def: "Tercero independiente que compra, revende, consigna o comercializa bajo contrato. El tratamiento contable depende de si hay venta, comision o consignacion." },
      { term: "Consignacion", unit: "Unidad 1", def: "Entrega de bienes a un tercero para su venta sin transferir el control. El consignante reconoce el ingreso solo cuando el consignatario vende al cliente final." },
      { term: "Transferencia de control", unit: "Unidad 1", def: "Momento en que el cliente obtiene la capacidad de dirigir el uso y obtener los beneficios del bien. Es el criterio para reconocer el ingreso en NIIF completas." },
      { term: "Estados por canal", unit: "Unidad 1", def: "Analisis de ingresos, costos y gastos por canal o segmento interno; usa las cifras del estado general con una base de asignacion definida." },
      { term: "Casa central", unit: "Unidad 2", def: "Oficina principal o matriz que dirige las operaciones y conserva el control administrativo de agencias y sucursales." },
      { term: "Agencia", unit: "Unidad 2", def: "Punto de promocion o venta que normalmente no lleva contabilidad completa; opera con un fondo fijo y remite pedidos a la casa central." },
      { term: "Sucursal", unit: "Unidad 2", def: "Establecimiento dependiente que puede llevar libros, inventario, cuentas por cobrar y resultados propios, con mayor autonomia operativa que una agencia." },
      { term: "Cuentas reciprocas", unit: "Unidad 2", def: "Cuentas de enlace entre casa central y sucursal (Sucursal y Casa central) que deben conciliar y se eliminan en el estado combinado." },
      { term: "Estados combinados", unit: "Unidad 2", def: "Estados que suman la informacion de casa central y sucursales eliminando saldos reciprocos y utilidades internas no realizadas." },
      { term: "Utilidad no realizada", unit: "Unidad 2", def: "Ganancia interna incluida en el inventario que aun no se ha vendido a terceros; se elimina hasta que se realice frente a un tercero." },
      { term: "Controladora o matriz", unit: "Unidad 3", def: "Entidad que controla una o mas subsidiarias y prepara estados financieros consolidados." },
      { term: "Subsidiaria", unit: "Unidad 3", def: "Entidad controlada por otra. Su control, y no solo el porcentaje juridico, determina la consolidacion segun NIIF 10." },
      { term: "Control", unit: "Unidad 3", def: "Poder sobre la participada, exposicion a rendimientos variables y capacidad de usar el poder para afectar esos rendimientos (NIIF 10)." },
      { term: "Interes no controlador", unit: "Unidad 3", def: "Participacion en el patrimonio de una subsidiaria que no es atribuible, directa o indirectamente, a la controladora." },

      { term: "Estados consolidados", unit: "Unidad 3", def: "Estados que presentan a la matriz y sus subsidiarias como una sola entidad economica, eliminando inversion, patrimonio y operaciones intragrupo." },
      { term: "Plusvalia", unit: "Unidad 3", def: "Exceso del costo de la adquisicion sobre la participacion en el valor razonable de los activos netos identificables adquiridos (NIIF 3)." },
      { term: "Metodo del costo", unit: "Unidad 3", def: "La inversion se mantiene al costo y los dividendos recibidos se reconocen como ingreso del periodo." },
      { term: "Metodo de participacion", unit: "Unidad 4", def: "La inversion se reconoce al costo inicial y se ajusta por la participacion en resultados y en otro resultado integral; los dividendos reducen su valor en libros." },
      { term: "Empresa asociada", unit: "Unidad 4", def: "Entidad sobre la que el inversionista tiene influencia significativa, pero no control ni control conjunto." },
      { term: "Influencia significativa", unit: "Unidad 4", def: "Poder de participar en las decisiones financieras y operativas sin llegar a controlarlas; se presume con 20% o mas del poder de voto (NIC 28)." },

      { term: "Deterioro de la inversion", unit: "Unidad 4", def: "Reduccion del valor en libros cuando el importe recuperable es menor que el saldo contable de la inversion (NIC 28 y NIC 36)." },
      { term: "Partes relacionadas", unit: "Transversal", def: "Personas o entidades relacionadas con la que informa; sus operaciones y saldos requieren revelacion segun NIC 24." }

    function readStore() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { profiles: {} };
      } catch {
        return { profiles: {} };
      }
    }

    // Persiste el store. Actualiza la marca de tiempo del perfil activo aqui,
    // para no invocar new Date()/localStorage en cada lectura de profile().
    function writeStore() {
      const current = store.profiles && store.profiles[activeProfile];
      if (current) current.updatedAt = new Date().toISOString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
    }

    // Garantiza que el perfil activo exista y tenga la forma esperada.
    // Solo escribe en disco cuando crea un perfil nuevo (evita el write-storm).
    function ensureProfile() {
      if (!store.profiles) store.profiles = {};
      let created = false;
      if (!store.profiles[activeProfile]) {
        store.profiles[activeProfile] = {
          role: activeRole,
          notes: {},
          quiz: {},
          complete: {},
          activity: {},
          rubric: {},
          updatedAt: new Date().toISOString()
        };
        created = true;
      }
      const current = store.profiles[activeProfile];
      if (!current.activity) current.activity = {};
      if (!current.notes) current.notes = {};
      if (!current.quiz) current.quiz = {};
      if (!current.complete) current.complete = {};
      if (!current.rubric) current.rubric = {};
      store.activeProfile = activeProfile;
      store.role = activeRole;
      current.role = activeRole;
      if (created) writeStore();
    }

    function profile() {
      ensureProfile();
      return store.profiles[activeProfile];
    }

    // Hash simple (djb2) para no guardar la clave en texto plano. NO es
    // criptograficamente seguro; es una ofuscacion basica para uso local.
    function simpleHash(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) | 0;
      return String(h >>> 0);
    }

    // Puerta de acceso local para roles Docente/Administrador. Sin servidor, la
    // clave se guarda ofuscada en este navegador: es un disuasor, no seguridad real.
    function authenticateElevatedRole() {
      if (!store.auth || !store.auth.hash) {
        const p1 = prompt("Configure una clave para los roles Docente/Administrador (se guarda solo en este navegador):");
        if (p1 == null || p1.trim() === "") return false;
        const p2 = prompt("Confirme la clave:");
        if (p2 !== p1) { alert("Las claves no coinciden."); return false; }
        store.auth = { hash: simpleHash(p1) };
        writeStore();
        toast("Clave configurada");
        return true;
      }
      const entered = prompt("Ingrese la clave para acceder a este rol:");
      if (entered == null) return false;
      if (simpleHash(entered) === store.auth.hash) return true;
      alert("Clave incorrecta.");
      return false;
    }

    function changeElevatedPassword() {
      if (store.auth && store.auth.hash) {
        const actual = prompt("Ingrese la clave actual:");
        if (actual == null) return;
        if (simpleHash(actual) !== store.auth.hash) { alert("Clave incorrecta."); return; }
      }
      const nueva = prompt("Ingrese la nueva clave:");
      if (nueva == null || nueva.trim() === "") return;
      const conf = prompt("Confirme la nueva clave:");
      if (conf !== nueva) { alert("Las claves no coinciden."); return; }
      store.auth = { hash: simpleHash(nueva) };
      writeStore();
      toast("Clave actualizada");
    }

    // Escapa texto de entrada del usuario antes de insertarlo como HTML.
    function escapeHtml(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    function money(value) {
      return Number(value || 0).toLocaleString("es-CR", { maximumFractionDigits: 2 });
    }

    function pct(value) {
      return `${Number(value || 0).toFixed(1)}%`;
    }

    // Formatea una celda como importe SOLO si es un numero puro; de lo contrario
    // la devuelve intacta (respeta textos como "80%", "150 a 700 c/u" o vacios).
    function fmtAmount(cell) {
      const s = String(cell == null ? "" : cell).trim();
      if (s === "") return "";
      return /^\d+(\.\d+)?$/.test(s) ? money(Number(s)) : cell;
    }

    // Igual que fmtAmount, pero admite importes negativos entre parentesis: (60000).
    function fmtImporte(value) {
      const s = String(value == null ? "" : value).trim();
      const neg = s.match(/^\((\d+(?:\.\d+)?)\)$/);
      if (neg) return `(${money(Number(neg[1]))})`;
      return /^-?\d+(\.\d+)?$/.test(s) ? money(Number(s)) : value;
    }

    function toggleSidebar(force) {
      const sidebar = document.querySelector(".sidebar");
      const backdrop = $("backdrop");
      const open = force === undefined ? !sidebar.classList.contains("open") : force;
      sidebar.classList.toggle("open", open);
      backdrop.classList.toggle("show", open);
    }

    function closeDrawer() {
      if (window.matchMedia("(max-width: 980px)").matches) toggleSidebar(false);
    }

    let toastTimer = null;
    function toast(message) {
      let el = $("toast");
      if (!el) {
        el = document.createElement("div");
        el.id = "toast";
        el.className = "toast";
        document.body.appendChild(el);
      }
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 1900);
    }

    function setScreen(screen) {
      activeScreen = screen;
      ["dashboard", "unit", "glossary", "casos", "report", "bibliography", "manual"].forEach(name => {
        $(`${name}Screen`).classList.toggle("active", name === screen);
      });
      render();
      closeDrawer();
    }

    const ACTIVITY_ITEMS = [
      { key: "concepts", label: "Conceptos clave revisados", weight: 15 },
      { key: "example", label: "Ejemplo resuelto analizado", weight: 15 },
      { key: "exBasico", label: "Ejercicio basico", weight: 10 },
      { key: "exIntermedio", label: "Ejercicio intermedio", weight: 10 },
      { key: "exAvanzado", label: "Ejercicio avanzado", weight: 10 },
      { key: "simulator", label: "Simulador completado", weight: 20 },
      { key: "quiz", label: "Autoevaluacion respondida", weight: 20 }
    ];

    function quizComplete(unit, p = profile()) {
      return answeredCount(unit, p) === unit.questions.length;
    }

    function activityDone(unit, key, p = profile()) {
      if (key === "quiz") return quizComplete(unit, p);
      if (key === "concepts") return conceptsAllRead(unit, p);
      const act = (p.activity || {})[unit.id] || {};
      return !!act[key];
    }

    function conceptRead(unit, index, p = profile()) {
      const act = (p.activity || {})[unit.id] || {};
      return !!(act.conceptsRead && act.conceptsRead[index]);
    }

    function conceptsReadCount(unit, p = profile()) {
      return unit.concepts.filter((_, i) => conceptRead(unit, i, p)).length;
    }

    function conceptsAllRead(unit, p = profile()) {
      return unit.concepts.length > 0 && conceptsReadCount(unit, p) === unit.concepts.length;
    }

    function toggleConcept(unitId, index) {
      const act = unitActivity(unitId);
      if (!act.conceptsRead) act.conceptsRead = {};
      act.conceptsRead[index] = !act.conceptsRead[index];
      writeStore();
    }

    function unitActivity(unitId) {
      const p = profile();
      if (!p.activity) p.activity = {};
      if (!p.activity[unitId]) p.activity[unitId] = {};
      return p.activity[unitId];
    }

    function markActivity(unitId, key) {
      const act = unitActivity(unitId);
      if (act[key]) return false;
      act[key] = true;
      writeStore();
      return true;
    }

    function refreshUnitProgress() {
      renderUnitAside();
      renderNav();
    }

    function completionRate(p = profile()) {
      if (!units.length) return 0;
      const sum = units.reduce((total, u) => total + unitProgress(u, p), 0);
      return Math.round(sum / units.length);
    }

    function answeredCount(unit, p = profile()) {
      const answers = (p.quiz || {})[unit.id] || [];
      return unit.questions.filter((_, index) => answers[index] !== undefined).length;
    }

    function correctCount(unit, p = profile()) {
      const answers = (p.quiz || {})[unit.id] || [];
      return unit.questions.filter((question, index) => answers[index] === question.answer).length;
    }

    function profileStats(p) {
      return {
        rate: completionRate(p),
        reviewed: units.filter(u => (p.complete || {})[u.id]).length,
        correct: units.reduce((sum, u) => sum + correctCount(u, p), 0),
        notes: units.filter(u => (p.notes || {})[u.id]).length
      };
    }

    function renderNav() {

        const done = `${unitProgress(unit, p)}%`;
        return `

          activeUnit = Number(btn.dataset.unit);
          activeTab = "contenido";
          setScreen("unit");
        });
      });
    }

      const unit = units[activeUnit];
      $("screenTitle").textContent = unit.title;

      $("unitScreen").innerHTML = `
        <div class="layout">

    function renderUnitAside() {
      const unit = units[activeUnit];
      const p = profile();
      const prog = unitProgress(unit, p);
      const items = ACTIVITY_ITEMS.map(item => {
        const done = activityDone(unit, item.key, p);
        return `<li class="check ${done ? "done" : ""}"><span class="tick">${done ? "&#10003;" : "&#9711;"}</span> <span>${item.label}</span><em>${item.weight}%</em></li>`;
      }).join("");
      $("unitAside").innerHTML = `
        <p class="info">${unit.norm}</p>
        <div class="progress"><span style="width:${prog}%"></span></div>
        <p class="footer-note">Avance de unidad: ${prog}%</p>
        <p class="small-label" style="color:var(--muted);margin-top:6px">Indicadores de avance (se marcan al realizar cada actividad):</p>
        <ul class="checklist">${items}</ul>
        <button class="primary" id="markComplete">${p.complete[unit.id] ? "Quitar sello de revision" : "Sellar como revisada (docente)"}</button>
        <p class="footer-note">El sello es un marcador manual para el reporte; no altera el porcentaje de avance.</p>
        <button id="printUnit" style="margin-top:8px;width:100%">Imprimir unidad: Ejemplo + Simulador (PDF)</button>
      `;
      $("printUnit").addEventListener("click", printUnit);
      $("markComplete").addEventListener("click", () => {
        const pr = profile();
        pr.complete[unit.id] = !pr.complete[unit.id];
        writeStore();
        toast(pr.complete[unit.id] ? "Unidad sellada como revisada" : "Sello de revision retirado");
        refreshUnitProgress();
      });
    }

    function tabLabel(tab) {
      return {
        contenido: "Contenido",
        ejemplo: "Ejemplo",
        ejercicios: "Ejercicios",
        simulador: "Simulador",
        autoevaluacion: "Autoevaluacion",
        notas: "Notas"
      }[tab];
    }

    function unitProgress(unit, p = profile()) {
      let score = 0;
      ACTIVITY_ITEMS.forEach(item => {
        if (activityDone(unit, item.key, p)) score += item.weight;
      });
      return score;
    }

    function renderTab(unit) {
      const body = $("tabBody");
      if (activeTab === "contenido") {
        const terms = unitGlossaryTerms(unit);
        body.innerHTML = `
          <div class="unit-grid">
            <div class="mini">
              <h4>Conceptos clave <span class="badge blue">${conceptsReadCount(unit)}/${unit.concepts.length} leidos</span></h4>

              <ul class="concept-list">
                ${unit.concepts.map((item, i) => `
                  <li class="concept ${conceptRead(unit, i) ? "read" : ""}" data-concept="${i}" role="button" tabindex="0">
                    <span class="tick">${conceptRead(unit, i) ? "&#10003;" : "&#9711;"}</span>
                    <span>${item}</span>
                  </li>
                `).join("")}
              </ul>
              ${terms.length ? `
                <p class="small-label" style="color:var(--muted);margin-top:10px">Terminos de esta unidad (clic para ver la definicion en el glosario):</p>
                <div class="term-chips">
                  ${terms.map(g => `<button class="badge blue" data-term="${g.term}" title="Ver en el glosario">${g.term}</button>`).join("")}
                </div>
              ` : ""}
            </div>
            <div class="mini">

            </div>
          </div>
          <p class="warning">Criterio didactico: primero se clasifica la relacion economica; luego se determina el tratamiento contable y finalmente se preparan asientos, ajustes o eliminaciones.</p>
        `;
        document.querySelectorAll("[data-term]").forEach(btn => {
          btn.addEventListener("click", () => openGlossaryTerm(btn.dataset.term));
        });
        const onConcept = (li) => {
          toggleConcept(unit.id, Number(li.dataset.concept));
          renderTab(unit);
          refreshUnitProgress();
        };
        document.querySelectorAll("[data-concept]").forEach(li => {
          li.addEventListener("click", () => onConcept(li));
          li.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onConcept(li); }
          });
        });
      }
      if (activeTab === "ejemplo") {
        body.innerHTML = `
          <p class="info">${unit.example.story}</p>
          ${journalTable(unit.example.rows)}
          <div class="result-box"><strong>Resultado esperado:</strong> ${unit.example.result}</div>
          ${unit.example.niif18 ? niif18Block(unit.example.niif18.filas, unit.example.niif18.nota) : ""}
        `;

      }
      if (activeTab === "ejercicios") {

            renderUnit();

        const levelKey = { basico: "exBasico", intermedio: "exIntermedio", avanzado: "exAvanzado" };
        document.querySelectorAll("[data-ex-level]").forEach(det => {
          det.addEventListener("toggle", () => {
            if (det.open && levelKey[det.dataset.exLevel]) {
              if (markActivity(unit.id, levelKey[det.dataset.exLevel])) refreshUnitProgress();
            }
          });
        });
      }
      if (activeTab === "simulador") {
        body.innerHTML = simulatorHtml(unit);
        unit.simulator.fields.forEach(([key]) => $(key).addEventListener("input", () => calculateSimulator(unit)));
        calculateSimulator(unit);
      }
      if (activeTab === "autoevaluacion") {
        body.innerHTML = quizHtml(unit);
        document.querySelectorAll("[data-q]").forEach(btn => {
          btn.addEventListener("click", () => answerQuestion(unit, Number(btn.dataset.q), Number(btn.dataset.option)));
        });
      }
      if (activeTab === "notas") {
        const p = profile();
        body.innerHTML = `
          <p class="info">Escriba observaciones, dudas o acuerdos de clase. Se guardan en este navegador.</p>
          <textarea id="unitNotes" placeholder="Notas de estudio...">${escapeHtml(p.notes[unit.id] || "")}</textarea>
          <div style="margin-top:10px"><button class="primary" id="saveNotes">Guardar notas</button></div>
        `;
        $("saveNotes").addEventListener("click", () => {
          profile().notes[unit.id] = $("unitNotes").value;
          writeStore();
          render();
          toast("Notas guardadas");
        });
      }
    }

    function journalTable(rows) {
      return `
        <div class="table-wrap">
          <table class="journal">
            <thead><tr><th>Cuenta</th><th>Debe</th><th>Haber</th><th>Detalle</th></tr></thead>
            <tbody>${rows.map(row => `<tr>${row.map((cell, i) => `<td>${(i === 1 || i === 2) ? fmtAmount(cell) : cell}</td>`).join("")}</tr>`).join("")}</tbody>
          </table>
        </div>
      `;
    }

    function unitGlossaryLabel(unit) {
      return `Unidad ${units.findIndex(u => u.id === unit.id) + 1}`;
    }

    function unitGlossaryTerms(unit) {
      const label = unitGlossaryLabel(unit);
      return glossary.filter(g => g.unit === label);
    }

    function openGlossaryTerm(term) {
      glossaryQuery = term;
      setScreen("glossary");
    }

    function levelLabel(level) {
      return { basico: "Basico", intermedio: "Intermedio", avanzado: "Avanzado" }[level] || level;
    }

    function levelBadgeClass(level) {
      return { basico: "", intermedio: "amber", avanzado: "rose" }[level] || "";
    }

    function exercisesHtml(unit) {
      const list = exercises[unit.id] || [];
      const levels = ["todos", "basico", "intermedio", "avanzado"];
      const filtered = activeLevel === "todos" ? list : list.filter(ex => ex.level === activeLevel);
      return `
        <p class="info">Resuelva primero por su cuenta y luego despliegue la solucion para comparar sus asientos y el resultado esperado.</p>
        <div class="tabs" style="background:transparent;border:0;padding:0 0 10px">
          ${levels.map(l => `<button class="${activeLevel === l ? "active" : ""}" data-level="${l}">${l === "todos" ? "Todos los niveles" : levelLabel(l)}</button>`).join("")}
        </div>
        ${filtered.length === 0
          ? `<div class="empty">No hay ejercicios para este nivel.</div>`
          : filtered.map(ex => `
            <div class="mini" style="margin-bottom:12px">
              <h4>${ex.title} <span class="badge ${levelBadgeClass(ex.level)}">${levelLabel(ex.level)}</span></h4>
              <p>${ex.statement}</p>
              <details data-ex-level="${ex.level}">
                <summary style="cursor:pointer;font-weight:700;color:var(--blue)">Ver solucion</summary>
                <div style="margin-top:10px">
                  ${ex.rows ? journalTable(ex.rows) : ""}
                  <div class="result-box"><strong>Resultado:</strong> ${ex.result}</div>
                  ${ex.tip ? `<p class="footer-note">Sugerencia didactica: ${ex.tip}</p>` : ""}
                </div>
              </details>
            </div>
          `).join("")}
      `;
    }

    function simulatorHtml(unit) {
      return `
        <div class="info">
          <strong>Datos del caso para digitar:</strong>
          <ul>
            ${unit.simulator.fields.map(([, label, value]) => `<li>${label}: ${money(value)}</li>`).join("")}
          </ul>
        </div>
        <div class="form-grid">
          ${unit.simulator.fields.map(([key, label]) => `
            <label>
              <span class="small-label" style="color:var(--muted)">${label}</span>
              <input id="${key}" type="number" placeholder="Digite el dato del caso">
            </label>
          `).join("")}
        </div>
        <div class="result-box" id="simResult">Digite los datos del caso para calcular el resultado esperado.</div>
      `;
    }

    function calculateSimulator(unit) {
      const missing = unit.simulator.fields.some(([key]) => $(key).value === "");
      if (missing) {
        $("simResult").innerHTML = "Digite todos los datos del caso para calcular el resultado esperado.";
        return;
      }
      let html = "";
      if (unit.id === "u1") {
        const cost = Number($("inventoryCost").value);
        const sold = Number($("soldPercent").value) / 100;
        const sales = Number($("salesAmount").value);
        const exp = Number($("distributionExpense").value);
        const cogs = cost * sold;
        html = `<strong>Resultado:</strong><br>Costo vendido: ${money(cogs)}<br>Inventario final: ${money(cost - cogs)}<br>Utilidad bruta: ${money(sales - cogs)}<br>Resultado despues de gastos: ${money(sales - cogs - exp)}`;
      }
      if (unit.id === "u2") {
        const shipment = Number($("shipment").value);
        const sales = Number($("branchSales").value);
        const exp = Number($("branchExpenses").value);
        const reciprocal = Number($("reciprocalBalance").value);
        html = `<strong>Estado combinado:</strong><br>Cuenta reciproca a eliminar: ${money(reciprocal)}<br>Ventas de sucursal: ${money(sales)}<br>Costo trasladado: ${money(shipment)}<br>Resultado de sucursal: ${money(sales - shipment - exp)}`;
      }
      if (unit.id === "u3") {
        const own = Number($("ownership").value) / 100;
        const price = Number($("purchasePrice").value);
        const equity = Number($("subEquity").value);
        const profit = Number($("subProfit").value);
        const div = Number($("dividends").value);
        const shareProfit = profit * own;
        const shareDiv = div * own;
        const carrying = price + shareProfit - shareDiv;
        const nci = equity * (1 - own);
        html = `<strong>Comparacion:</strong><br>Participacion en utilidad: ${money(shareProfit)}<br>Dividendos atribuibles: ${money(shareDiv)}<br>Saldo metodo de participacion: ${money(carrying)}<br>Interes no controlador inicial estimado: ${money(nci)}`;
      }
      if (unit.id === "u4") {
        const pctVal = Number($("associatePct").value) / 100;
        const cost = Number($("initialCost").value);
        const profit = Number($("associateProfit").value);
        const div = Number($("associateDividends").value);
        const income = profit * pctVal;
        const dividends = div * pctVal;
        html = `<strong>Metodo de participacion:</strong><br>Ingreso por participacion: ${money(income)}<br>Dividendos recibidos: ${money(dividends)}<br>Saldo final de inversion: ${money(cost + income - dividends)}<br>Participacion usada: ${pct(pctVal * 100)}`;
      }
      // Se pasan valores crudos; fmtImporte (dentro de estadoNiif18) aplica el
      // formato de miles una sola vez, igual que en casos y ejemplos.
      const neg = (x) => `(${x})`;
      let simFilas = [], simNota = "";
      if (unit.id === "u1") {
        const cogs = Number($("inventoryCost").value) * Number($("soldPercent").value) / 100;
        const op = Number($("salesAmount").value) - cogs - Number($("distributionExpense").value);
        simFilas = [
          { c: "Ingresos de actividades ordinarias (operativa)", v: Number($("salesAmount").value) },
          { c: "Costo de ventas", v: neg(cogs) },
          { c: "Gastos de distribucion", v: neg(Number($("distributionExpense").value)) },
          { c: "Utilidad operativa", v: op, sub: true },
          { c: "Resultado antes de financiacion e impuestos", v: op, sub: true }
        ];
        simNota = "Resultado de la actividad principal: categoria operativa (NIIF 18).";
      }
      if (unit.id === "u2") {
        const op = Number($("branchSales").value) - Number($("shipment").value) - Number($("branchExpenses").value);
        simFilas = [
          { c: "Ingresos de actividades ordinarias (sucursal)", v: Number($("branchSales").value) },
          { c: "Costo de ventas (mercaderia trasladada)", v: neg(Number($("shipment").value)) },
          { c: "Gastos de la sucursal", v: neg(Number($("branchExpenses").value)) },
          { c: "Utilidad operativa", v: op, sub: true },
          { c: "Resultado antes de financiacion e impuestos", v: op, sub: true }
        ];
        simNota = "El resultado de la sucursal es operativo; presentacion segun NIIF 18.";
      }
      if (unit.id === "u3") {
        const shareProfit = Number($("subProfit").value) * Number($("ownership").value) / 100;
        simFilas = [
          { c: "Participacion en resultados de la subsidiaria (inversion)", v: shareProfit },
          { c: "Resultado antes de financiacion e impuestos", v: shareProfit, sub: true }
        ];
        simNota = "En estados separados por participacion, va en la categoria de inversion (NIIF 18). En consolidacion se integra en la categoria operativa.";
      }
      if (unit.id === "u4") {
        const income = Number($("associateProfit").value) * Number($("associatePct").value) / 100;
        simFilas = [
          { c: "Participacion en resultados de asociadas (inversion)", v: income },
          { c: "Resultado antes de financiacion e impuestos", v: income, sub: true }
        ];
        simNota = "La participacion en resultados de asociadas se presenta en la categoria de inversion (NIIF 18).";
      }
      const combined = html + niif18Block(simFilas, simNota);
      lastSimResult[unit.id] = combined;
      $("simResult").innerHTML = combined;
      if (markActivity(unit.id, "simulator")) refreshUnitProgress();

      `;

              <strong>${q.q}</strong>

                ${q.options.map((option, optionIndex) => {
                  const answered = answers[qIndex] !== undefined;
                  const cls = answered && optionIndex === q.answer ? "correct" : answered && optionIndex === answers[qIndex] ? "incorrect" : "";
                  return `<button class="${cls}" data-q="${qIndex}" data-option="${optionIndex}">${option}</button>`;
                }).join("")}
              </div>
              ${answers[qIndex] !== undefined ? `<p class="info">${q.feedback}</p>` : ""}

    function deleteProfileByName(name) {
      if (!name || !store.profiles[name]) return;
      if (!confirm(`Eliminar el perfil "${name}" y todo su progreso? Esta accion no se puede deshacer.`)) return;
      delete store.profiles[name];
      if (name === activeProfile) {
        const restantes = Object.keys(store.profiles || {});
        activeProfile = restantes[0] || "Estudiante demo";
      }
      ensureProfile();
      writeStore();
      render();
      toast("Perfil eliminado: " + name);
    }

    function resetProfileByName(name) {
      if (!name || !store.profiles[name]) return;
      if (!confirm(`Reiniciar el progreso de "${name}"? Se conserva el perfil, pero se borran conceptos, ejercicios, notas y autoevaluaciones.`)) return;
      const role = store.profiles[name].role || "estudiante";
      store.profiles[name] = {
        role, notes: {}, quiz: {}, complete: {}, activity: {}, rubric: {},
        updatedAt: new Date().toISOString()
      };
      writeStore();
      render();
      toast("Progreso reiniciado: " + name);
    }

    function renameProfileByName(oldName) {
      if (!oldName || !store.profiles[oldName]) return;
      const nuevo = (prompt("Nuevo nombre para el perfil:", oldName) || "").trim();
      if (!nuevo || nuevo === oldName) return;
      if (store.profiles[nuevo]) {
        alert("Ya existe un perfil con ese nombre. Elija otro nombre.");
        return;
      }
      store.profiles[nuevo] = store.profiles[oldName];
      delete store.profiles[oldName];
      if (oldName === activeProfile) activeProfile = nuevo;
      ensureProfile();
      writeStore();
      render();
      toast("Perfil renombrado a: " + nuevo);
    }

    function csvCell(value) {
      return `"${String(value).replace(/"/g, '""')}"`;
    }

    function exportGroupCsv() {
      const names = Object.keys(store.profiles || {});
      const header = ["Perfil", "Rol", "Avance %", "Unidades revisadas", "Respuestas correctas", "Unidades con notas", "Observacion docente"];
      const lines = [header.map(csvCell).join(",")];
      names.forEach(name => {
        const pr = store.profiles[name];
        const stats = profileStats(pr);
        lines.push([
          name,
          pr.role || "estudiante",
          stats.rate,
          `${stats.reviewed}/4`,
          `${stats.correct}/8`,
          `${stats.notes}/4`,
          (pr.rubricNotes || "").replace(/\r?\n/g, " ")
        ].map(csvCell).join(","));
      });
      downloadBlob("﻿" + lines.join("\r\n"), "contaexpand_grupo.csv", "text/csv;charset=utf-8");
    }

    function exportGroupJson() {
      const names = Object.keys(store.profiles || {});
      const data = names.map(name => {
        const pr = store.profiles[name];
        const stats = profileStats(pr);
        return {
          perfil: name,
          rol: pr.role || "estudiante",
          avance: stats.rate,
          unidadesRevisadas: stats.reviewed,
          respuestasCorrectas: stats.correct,
          unidadesConNotas: stats.notes,
          observacionDocente: pr.rubricNotes || "",
          actualizado: pr.updatedAt || ""
        };
      });
      downloadBlob(JSON.stringify(data, null, 2), "contaexpand_grupo.json", "application/json");
    }

    function downloadBlob(content, filename, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
      toast("Archivo exportado: " + filename);
    }

    function feedbackText() {
      const rate = completionRate();
      if (rate >= 85) return "Dominio alto. Conviene trabajar un caso integrador con eliminaciones intragrupo y comparacion entre estados separados y consolidados.";
      if (rate >= 55) return "Avance medio. Se recomienda reforzar el vinculo entre clasificacion de la entidad, asiento contable y fundamento normativo.";
      return "Avance inicial. Empiece por conceptos clave y ejemplos predeterminados antes de modificar datos en los simuladores.";
    }

            <p class="info">Herramienta educativa interactiva para el curso de Contabilidad Avanzada. Cubre cuatro unidades bajo NIIF completas: expansion empresarial, agencias y sucursales, inversion en subsidiarias y empresas asociadas. Funciona sin internet y guarda tu avance en el propio navegador (localStorage).</p>
            <div class="unit-grid">
              <div class="mini"><h4>Unidad 1</h4><p>Expansion de Empresas: distribuidores internos/externos, estados por canal y control contable.</p></div>
              <div class="mini"><h4>Unidad 2</h4><p>Agencias y Sucursales: casa central, cuentas reciprocas y estados combinados.</p></div>
              <div class="mini"><h4>Unidad 3</h4><p>Inversion en Subsidiarias: control, metodo del costo, participacion y consolidacion.</p></div>
              <div class="mini"><h4>Unidad 4</h4><p>Empresas Asociadas: influencia significativa y metodo de participacion.</p></div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head"><h3>2. Primeros pasos</h3><span class="badge">Inicio</span></div>
          <div class="panel-body">
            <ol class="manual-list">
              <li><strong>Escribe tu nombre</strong> en el campo de perfil (barra lateral) y pulsa <em>Guardar perfil</em>. Tu avance queda ligado a ese nombre.</li>
              <li><strong>Deja el rol en Estudiante.</strong> Los roles Docente y Administrador piden clave (ver seccion 7).</li>
              <li>Desde el <strong>Panel</strong>, pulsa <em>Iniciemos</em> (o <em>Repasar unidades</em>) para entrar a la unidad sugerida.</li>
              <li>Tu progreso se guarda solo; puedes cerrar y volver luego en el mismo equipo y navegador.</li>
            </ol>
            <p class="warning">El avance se guarda en el navegador del equipo. Si cambias de computadora o borras los datos del navegador, empiezas de cero. Usa <em>Reporte &rarr; Exportar</em> para respaldar.</p>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head"><h3>3. Las secciones del menu superior</h3><span class="badge">Navegacion</span></div>
          <div class="panel-body">
            <div class="unit-grid">
              <div class="mini"><h4>Panel</h4><p>Resumen de tu avance, unidad sugerida y accesos rapidos.</p></div>
              <div class="mini"><h4>Glosario</h4><p>Terminos clave con buscador; cada termino enlaza a su unidad.</p></div>
              <div class="mini"><h4>Casos resueltos</h4><p>Ejercicios completos (enunciado, datos, asientos, solucion y fundamento NIIF). Filtrables por unidad.</p></div>
              <div class="mini"><h4>Reporte</h4><p>Detalle de avance, autoevaluaciones y gestion de perfiles (renombrar, reiniciar, eliminar) y exportacion.</p></div>
              <div class="mini"><h4>Bibliografia</h4><p>Fuentes locales aportadas y marco normativo NIIF.</p></div>
              <div class="mini"><h4>Manual</h4><p>Esta guia de uso.</p></div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head"><h3>4. Dentro de una unidad</h3><span class="badge">6 pestanas</span></div>
          <div class="panel-body">
            <ol class="manual-list">
              <li><strong>Contenido:</strong> desarrollo academico. Marca cada <em>concepto clave</em> conforme lo lees (asi se acredita el avance).</li>
              <li><strong>Ejemplo:</strong> caso guiado con asientos y presentacion segun NIIF 18. Abrelo para acreditarlo.</li>
              <li><strong>Ejercicios:</strong> practica en tres niveles (basico, intermedio, avanzado).</li>
              <li><strong>Simulador:</strong> ingresa datos y calcula; muestra resultados y la presentacion por categorias NIIF 18.</li>
              <li><strong>Autoevaluacion:</strong> preguntas de opcion multiple con retroalimentacion.</li>
              <li><strong>Notas:</strong> apuntes personales que se guardan con tu perfil.</li>
            </ol>
            <p class="info">Usa los botones <strong>Anterior / Siguiente</strong> para moverte entre unidades, y <strong>Imprimir</strong> para generar PDF del ejemplo y el simulador de la unidad.</p>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head"><h3>5. Como se calcula tu avance</h3><span class="badge">100 % por unidad</span></div>
          <div class="panel-body">
            <p class="info">Cada unidad llega a 100 % combinando actividades reales. Los pesos son:</p>
            <div class="table-wrap">
              <table class="journal">
                <thead><tr><th>Actividad</th><th>Peso</th></tr></thead>
                <tbody>
                  ${ACTIVITY_ITEMS.map(i => `<tr><td>${i.label}</td><td>${i.weight}%</td></tr>`).join("")}
                </tbody>
              </table>
            </div>
            <p class="warning">Los conceptos suman su peso solo cuando marcas <strong>todos</strong> los conceptos clave de la unidad; abrir la pestana no otorga avance por si solo.</p>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head"><h3>6. Reporte y respaldo de datos</h3><span class="badge">Perfiles</span></div>
          <div class="panel-body">
            <ol class="manual-list">
              <li>En <strong>Reporte</strong> ves tu avance por unidad y tus respuestas de autoevaluacion.</li>
              <li>Desde alli puedes <strong>renombrar, reiniciar o eliminar</strong> un perfil.</li>
              <li><strong>Exportar</strong> descarga tus datos (JSON/CSV) para respaldo o para entregar al docente.</li>
            </ol>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head"><h3>7. Roles Docente y Administrador</h3><span class="badge">Acceso con clave</span></div>
          <div class="panel-body">
            <ol class="manual-list">
              <li>En la barra lateral cambia el <strong>rol</strong> a Docente o Administrador; se solicitara una <strong>clave</strong> (la misma para ambos).</li>
              <li>El rol elevado da acceso a la vista de <strong>reporte grupal</strong> y exportaciones de grupo.</li>
              <li>La clave puede cambiarse desde la opcion correspondiente cuando el rol esta activo.</li>
              <li>Por seguridad, al recargar la pagina el rol vuelve a Estudiante hasta ingresar la clave otra vez.</li>
            </ol>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head"><h3>8. Preguntas frecuentes</h3><span class="badge">Ayuda</span></div>
          <div class="panel-body">
            <div class="unit-grid">
              <div class="mini"><h4>Perdi mi avance</h4><p>Se guarda por navegador y equipo. Si limpiaste datos o cambiaste de equipo, restaura desde un respaldo exportado.</p></div>
              <div class="mini"><h4>No suma el avance</h4><p>Verifica que marcaste todos los conceptos, abriste el ejemplo, hiciste los ejercicios, el simulador y la autoevaluacion.</p></div>
              <div class="mini"><h4>Puedo usarlo sin internet</h4><p>Si. Es un unico archivo HTML; funciona abriendolo directamente en el navegador.</p></div>
              <div class="mini"><h4>Como comparto con estudiantes</h4><p>Comparte el enlace publicado o el archivo ContaExpand_Edu.html.</p></div>
            </div>
            <div class="panel-actions">
              <button id="printManual" class="ghost">Imprimir manual (PDF)</button>
            </div>
          </div>
        </div>
      `;
      const pm = $("printManual");
      if (pm) pm.addEventListener("click", () => window.print());
    }

    function render() {
      ensureProfile();
      $("profileName").value = activeProfile;
      $("roleSelect").value = activeRole;
      $("profileList").innerHTML = Object.keys(store.profiles || {}).map(name => `<option value="${escapeHtml(name)}"></option>`).join("");
      renderNav();
      if (activeScreen === "dashboard") renderDashboard();
      if (activeScreen === "unit") renderUnit();
      if (activeScreen === "glossary") renderGlossary();
      if (activeScreen === "casos") renderCasos();
      if (activeScreen === "report") renderReport();
      if (activeScreen === "bibliography") renderBibliography();
      if (activeScreen === "manual") renderManual();
      const exportBtn = $("exportData");
      if (exportBtn) {
        exportBtn.addEventListener("click", () => {
          downloadBlob(JSON.stringify(store, null, 2), "contaexpand_datos_locales.json", "application/json");
        });
      }
      const passBtn = $("changePassword");
      if (passBtn) passBtn.addEventListener("click", changeElevatedPassword);
    }

    $("saveProfile").addEventListener("click", () => {
      const name = $("profileName").value.trim() || "Estudiante demo";
      activeProfile = name;
      activeRole = $("roleSelect").value;
      ensureProfile();
      writeStore();
      render();
      toast("Perfil guardado: " + activeProfile);
    });

    $("menuToggle").addEventListener("click", () => toggleSidebar());
    $("backdrop").addEventListener("click", () => toggleSidebar(false));

    $("roleSelect").addEventListener("change", () => {
      const target = $("roleSelect").value;
      if (ELEVATED_ROLES.includes(target) && !elevated) {
        if (!authenticateElevatedRole()) {
          $("roleSelect").value = "estudiante";
          activeRole = "estudiante";
          ensureProfile();
          writeStore();
          render();
          return;
        }
        elevated = true;
      }
      activeRole = target;
      ensureProfile();
      writeStore();
      render();
    });

    // Reiniciar/renombrar/eliminar perfiles se realiza desde el Reporte (ver renderReport).

    $("goDashboard").addEventListener("click", () => setScreen("dashboard"));
    $("goGlossary").addEventListener("click", () => setScreen("glossary"));
    $("goCasos").addEventListener("click", () => setScreen("casos"));
    $("goReport").addEventListener("click", () => setScreen("report"));
    $("goBibliography").addEventListener("click", () => setScreen("bibliography"));
    $("goManual").addEventListener("click", () => setScreen("manual"));

    // Al cargar, los roles elevados requieren autenticarse de nuevo:
    // se inicia siempre como estudiante hasta ingresar la clave.
    if (ELEVATED_ROLES.includes(activeRole)) activeRole = "estudiante";

    ensureProfile();
    render();
  </script>
</body>
</html>
